<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rahasia Cinta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* mencegah teks terpilih saat spam, tetap nyaman */
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffeef4 0%, #ffe0ea 100%);
            font-family: 'Segoe UI', 'Quicksand', 'Poppins', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            cursor: default;
        }

        /* Kartu utama — berada di atas spam emoji */
        .card {
            max-width: 620px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 2.2rem 2rem 2.5rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 8px 18px rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.7);
            position: relative;
            z-index: 20;
            /* agar konten terbaca di atas hujan emoji */
        }

        .greeting {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c44569, #e66767);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 0.75rem;
            text-shadow: 0 2px 5px rgba(193, 66, 89, 0.1);
        }

        .sub-note {
            font-size: 1.2rem;
            color: #6b4e5e;
            background: rgba(255, 224, 235, 0.8);
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 60px;
            font-weight: 500;
            margin-bottom: 2rem;
            letter-spacing: -0.2px;
            backdrop-filter: blur(2px);
        }

        .btn-secret {
            background: linear-gradient(95deg, #ff8a9f, #ff6f8b);
            border: none;
            padding: 1rem 2rem;
            font-size: 1.25rem;
            font-weight: 600;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            box-shadow: 0 10px 18px -6px #ff6f8b70;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: inherit;
            letter-spacing: 0.3px;
            position: relative;
            z-index: 25;
        }

        .btn-secret:hover:not(:disabled) {
            transform: scale(1.02);
            background: linear-gradient(95deg, #ff768f, #ff5777);
            box-shadow: 0 15px 25px -8px #ff5e7e;
        }

        .btn-secret:active:not(:disabled) {
            transform: scale(0.97);
        }

        .btn-secret:disabled {
            opacity: 0.8;
            cursor: default;
            filter: grayscale(0.05);
            transform: scale(0.98);
            box-shadow: 0 6px 12px -4px rgba(0, 0, 0, 0.1);
            background: linear-gradient(95deg, #d97a8e, #cd6b82);
        }

        .secret-wrapper {
            margin-top: 2rem;
            overflow: hidden;
        }

        .secret-message {
            background: #fff5f8dd;
            backdrop-filter: blur(8px);
            padding: 1.5rem 1.2rem;
            border-radius: 36px;
            border-left: 6px solid #ff90aa;
            border-right: 1px solid #ffe2ec;
            box-shadow: 0 12px 20px -12px rgba(128, 70, 87, 0.2);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .hidden {
            display: none;
        }

        .show-secret {
            display: block;
            animation: gentleAppear 0.6s ease forwards;
        }

        @keyframes gentleAppear {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .secret-text {
            font-size: 1.45rem;
            font-weight: 540;
            line-height: 1.45;
            color: #3f2c34;
            background: #ffffffc9;
            padding: 0.8rem 1rem;
            border-radius: 28px;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .secret-text .heart-icon {
            font-size: 1.7rem;
            display: inline-block;
            animation: tinyBeat 1.2s infinite ease;
        }

        @keyframes tinyBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }

        .small-credit {
            margin-top: 1.8rem;
            font-size: 0.75rem;
            color: #be8c9c;
            font-weight: 400;
            opacity: 0.8;
            letter-spacing: 0.3px;
        }

        /* ========= SPAM EMOJI BACKGROUND TAK BERHENTI ========= */
        /* elemen emoji yang melayang / hujan */
        .spam-emoji {
            position: fixed;
            pointer-events: none;
            z-index: 10;      /* di bawah kartu (z-index kartu 20) tapi tetap terlihat sebagai background manis */
            font-size: 1.8rem;
            will-change: transform, opacity;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
            animation: floatEmojiRain 3.2s linear forwards;
            text-shadow: 0 0 2px rgba(255, 215, 225, 0.8);
        }

        /* animasi jatuh / melayang dari atas ke bawah dengan sedikit goyangan */
        @keyframes floatEmojiRain {
            0% {
                opacity: 0.9;
                transform: translateY(-20px) rotate(0deg) scale(0.7);
            }
            20% {
                opacity: 1;
                transform: translateY(15vh) rotate(8deg) scale(1);
            }
            60% {
                opacity: 0.9;
                transform: translateY(55vh) rotate(-5deg) scale(1.05);
            }
            100% {
                opacity: 0;
                transform: translateY(105vh) rotate(12deg) scale(0.8);
            }
        }

        /* variasi animasi kedua untuk gerakan naik turun (opsional tapi seragam) */
        /* untuk membuat lebih hidup, beberapa emoji bisa punya durasi berbeda */
        @keyframes floatEmojiUp {
            0% {
                opacity: 0.8;
                transform: translateY(100vh) rotate(0deg) scale(0.6);
            }
            30% {
                opacity: 1;
                transform: translateY(60vh) rotate(10deg) scale(1);
            }
            70% {
                opacity: 0.9;
                transform: translateY(25vh) rotate(-6deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-30vh) rotate(15deg) scale(0.9);
            }
        }

        /* background static deco (opsional) */
        .bg-deco-static {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 70px;
            opacity: 0.08;
            pointer-events: none;
            z-index: 1;
            transform: rotate(-8deg);
        }

        .bg-deco-static-left {
            position: fixed;
            top: 30px;
            left: 20px;
            font-size: 55px;
            opacity: 0.07;
            pointer-events: none;
            z-index: 1;
        }

        /* responsive */
        @media (max-width: 520px) {
            .card {
                padding: 1.8rem 1.2rem 2rem;
            }
            .greeting {
                font-size: 2.4rem;
            }
            .sub-note {
                font-size: 1rem;
            }
            .btn-secret {
                font-size: 1rem;
                padding: 0.8rem 1.5rem;
            }
            .secret-text {
                font-size: 1.2rem;
            }
            .spam-emoji {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<!-- dekorasi latar diam (tidak mengganggu) -->
<div class="bg-deco-static">💕🌸</div>
<div class="bg-deco-static-left">✨💖</div>

<div class="card">
    <div class="greeting">
        Hai, TATAA! 💫
    </div>
    <div class="sub-note">
        🌱 Aku bikin ini kecil-kecilan, tapi niat.
    </div>

    <button id="revealButton" class="btn-secret">
        💌 Klik untuk tahu rahasiaku 💌
    </button>

    <div class="secret-wrapper">
        <div id="secretMessageBlock" class="secret-message hidden">
            <div class="secret-text">
                <span class="heart-icon">❤️🤍</span>
                Aku suka kamu. Dunia memang pahit, makanya Tuhan nyiptain kamu biar ada manis-manisnya.
                <span class="heart-icon">🤍🌸</span>
            </div>
        </div>
    </div>

    <div class="small-credit">
        🤍🤍 Don't forget to SMILE, because ur smile is very BEAUTIFUL 🤍🤍
    </div>
</div>

<script>
    (function() {
        // ----- ELEMEN -----
        const revealBtn = document.getElementById('revealButton');
        const secretMsgDiv = document.getElementById('secretMessageBlock');
        
        // flag apakah sudah ditekan (agar spam hanya dimulai sekali)
        let clicked = false;
        let spamInterval = null;
        
        // DAFTAR EMOJI YANG DIMINTA (lengkap dan berulang biar variatif)
        const loveEmojis = [
            '🤍', '🥰', '😍', '😘', '💖', '💗', '💓', '❤️', 
            '🤍', '🌷', '🪻', '⚘️',      // sesuai permintaan
            '💕', '💞', '🌸', '🌺', '✨'  // tambahan manis tapi tetap fokus ke daftar utama
        ];
        
        // daftar utama (supaya lebih sering muncul yang diminta)
        const mainEmojiList = ['🤍','🥰','😍','😘','💖','💗','💓','❤️','🤍','🌷','🪻','⚘️'];
        
        // Fungsi untuk mendapatkan emoji secara acak (80% dari main list, 20% dari loveEmojis biar seru)
        function getRandomEmoji() {
            const r = Math.random();
            if (r < 0.85) { // dominan dari daftar utama yang diminta user
                return mainEmojiList[Math.floor(Math.random() * mainEmojiList.length)];
            } else {
                return loveEmojis[Math.floor(Math.random() * loveEmojis.length)];
            }
        }
        
        /**
         * Membuat satu elemen emoji melayang (background spam tak berhenti)
         * Posisi random horizontal, durasi & delay sedikit variatif
         */
        function createSpamEmoji() {
            const emojiChar = getRandomEmoji();
            const emojiDiv = document.createElement('div');
            emojiDiv.className = 'spam-emoji';
            emojiDiv.innerText = emojiChar;
            
            // Ukuran acak biar estetik (1.2rem sampai 2.8rem)
            const size = 1.2 + Math.random() * 1.6;
            emojiDiv.style.fontSize = `${size}rem`;
            
            // Posisi horizontal acak (0% - 100% lebar viewport)
            const leftPos = Math.random() * 100;
            emojiDiv.style.left = `${leftPos}%`;
            
            // Sedikit acak untuk jenis animasi: dua varian biar lebih hidup (jatuh atau naik)
            const animationType = Math.random() > 0.7 ? 'floatEmojiUp' : 'floatEmojiRain';
            const duration = 2.5 + Math.random() * 2.8; // antara 2.5s - 5.3s
            const delay = Math.random() * 0.8; // delay 0 sampai 0.8 detik
            
            emojiDiv.style.animation = `${animationType} ${duration}s linear ${delay}s forwards`;
            
            // tambah sedikit random rotasi awal (gak terlalu penting)
            emojiDiv.style.transform = `rotate(${Math.random() * 30 - 15}deg)`;
            
            document.body.appendChild(emojiDiv);
            
            // Hapus dari DOM setelah animasi selesai (agar tidak menumpuk memori)
            const totalDuration = (duration + delay) * 1000;
            setTimeout(() => {
                if (emojiDiv && emojiDiv.remove) emojiDiv.remove();
            }, totalDuration + 200);
        }
        
        /**
         * MEMULAI SPAM TAK TERHENTI (interval 180ms)
         * Hasilkan emoji terus menerus sebagai background.
         * Batas interval agar tidak overload, tapi tetap deras seperti "spam"
         */
        function startUnlimitedEmojiSpam() {
            if (spamInterval) return; // sudah berjalan
            
            // Langsung banjiri dengan beberapa emoji awal (biar langsung ramai)
            for (let i = 0; i < 18; i++) {
                setTimeout(() => createSpamEmoji(), i * 45);
            }
            
            // Interval utama: setiap 150ms (cukup deras tapi tetap smooth)
            spamInterval = setInterval(() => {
                createSpamEmoji();
                // kadang double spawn biar lebih "spam" (10% chance buat spawn dua kali dalam satu interval)
                if (Math.random() < 0.25) {
                    setTimeout(() => createSpamEmoji(), 30);
                }
            }, 150);
        }
        
        /**
         * Efek burst hati instan saat mengungkap rahasia (tambahan dramatis)
         */
        function burstInitialHearts(count = 24) {
            const rect = revealBtn.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const heartSymbols = ['❤️', '💖', '💗', '💓', '🤍', '🌷'];
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 55 + 15;
                const offsetX = Math.cos(angle) * radius * (Math.random() > 0.5 ? 1 : -1);
                const offsetY = Math.sin(angle) * radius * 0.9 - 12;
                const startLeft = centerX + offsetX;
                const startTop = centerY + offsetY;
                const heart = document.createElement('div');
                heart.className = 'spam-emoji';  // reuse class tapi animasi beda dikit
                heart.innerText = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heart.style.left = startLeft + 'px';
                heart.style.top = startTop + 'px';
                heart.style.fontSize = (1.2 + Math.random() * 1.2) + 'rem';
                heart.style.position = 'fixed';
                heart.style.pointerEvents = 'none';
                heart.style.zIndex = '25';
                heart.style.animation = 'floatEmojiRain 1.2s ease-out forwards';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1300);
            }
        }
        
        /**
         * Menampilkan pesan rahasia + memulai spam emoji TAK BERTAHENTI
         */
        function revealSecretAndStartSpam() {
            if (clicked) return;
            clicked = true;
            
            // 1. Tampilkan pesan rahasia dengan animasi
            secretMsgDiv.classList.remove('hidden');
            secretMsgDiv.classList.add('show-secret');
            
            // 2. Ubah tombol menjadi "sudah terbuka"
            revealBtn.disabled = true;
            revealBtn.innerHTML = '💖 Rahasia tersingkap · Cinta mengalir 💖';
            
            // 3. Efek ledakan hati instan (sebagai selamat datang)
            burstInitialHearts(32);
            
            // 4. sedikit efek gemulai pada kartu
            const cardElem = document.querySelector('.card');
            if (cardElem) {
                cardElem.style.transform = 'scale(1.01)';
                setTimeout(() => {
                    if (cardElem) cardElem.style.transform = '';
                }, 250);
            }
            
            // 5. Ubah background body menjadi lebih romantis (tetap nyaman)
            document.body.style.transition = 'background 0.8s ease';
            document.body.style.background = 'linear-gradient(145deg, #ffeef7, #ffe0ee)';
            
            // 6. MULAI SPAM EMOJI TAK BERTAHENTI 🔥
            startUnlimitedEmojiSpam();
            
            // 7. bonus: menambahkan pesan di console (cuma estetik)
            console.log('💌💌 SPAM CINTA TAK PERNAH BERHENTI 💌💌');
        }
        
        // Pasang event listener ke tombol
        if (revealBtn) {
            revealBtn.addEventListener('click', revealSecretAndStartSpam);
            revealBtn.addEventListener('touchstart', (e) => {
                // tidak mengganggu, hanya untuk responsif
            }, { passive: true });
        }
        
        // Jika suatu saat user keluar halaman, bersihkan interval (optional)
        window.addEventListener('beforeunload', () => {
            if (spamInterval) clearInterval(spamInterval);
        });
        
        // Pencegahan double spam jika tombol ditekan cepat, sudah menggunakan flag.
        // Efek samping: animasi tetap berjalan selamanya sesuai keinginan.
    })();
</script>
</body>
</html>
